<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sessions — SkillSwap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fustat:wght@700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <script>(function(){var t=localStorage.getItem('skillswap-theme');if(!t)t=matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t);document.documentElement.style.colorScheme=t;})();</script>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <header id="app-header"></header>
    <main class="main-container" style="padding-top:100px;padding-bottom:64px">
      <div class="page-header"><h1 class="page-title">Session Scheduling</h1><p class="page-subtitle">Book sessions with matched partners. Times display in your local timezone.</p></div>
      <div class="form-card glass-card" style="margin-bottom:32px">
        <label for="match-select">Active Match</label>
        <select id="match-select" style="width:100%;margin-top:8px;padding:12px;border-radius:12px;border:1px solid var(--glass-border);background:var(--glass-bg-subtle);color:var(--text-primary)"></select>
      </div>
      <form id="session-form" class="form-card glass-card" style="margin-bottom:32px">
        <h2 style="font-family:Fustat,sans-serif;margin-bottom:16px">Propose a Session</h2>
        <div class="form-row">
          <div class="form-group"><label for="date">Date</label><input type="date" id="date" name="date" required /></div>
          <div class="form-group"><label for="time">Time</label><input type="time" id="time" name="time" required /></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label for="duration">Duration</label><select id="duration" name="duration"><option value="30">30 min</option><option value="45">45 min</option><option value="60" selected>60 min</option><option value="90">90 min</option></select></div>
          <div class="form-group"><label for="method">Meeting Method</label><select id="method" name="method"><option value="VIDEO">Video call</option><option value="IN_PERSON">In person</option><option value="PHONE">Phone</option></select></div>
        </div>
        <div class="form-group"><label for="details">Meeting link / location</label><input id="details" name="details" placeholder="Zoom link or address" /></div>
        <div class="form-group"><label for="agenda">Agenda</label><textarea id="agenda" name="agenda"></textarea></div>
        <button type="submit" class="primary-cta">Propose Session</button>
      </form>
      <div id="session-list" class="session-list"><p class="empty-state">Select a match to view sessions</p></div>
    </main>
    <footer id="app-footer"></footer>
    <script type="module" src="/js/pages/sessions.js"></script>
  </body>
</html>
