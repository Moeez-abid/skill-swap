<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marketplace — SkillSwap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fustat:wght@700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <script>(function(){var t=localStorage.getItem('skillswap-theme');if(!t)t=matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t);document.documentElement.style.colorScheme=t;})();</script>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <header id="app-header"></header>
    <main id="main-content" class="main-container" style="padding-top:100px;padding-bottom:64px">
      <div class="page-header">
        <h1 class="page-title">Skills Marketplace</h1>
        <p class="page-subtitle">Browse skills offered by the community. Filter by category and level, then request a swap.</p>
      </div>
      <div class="filters-bar glass-card">
        <label>Category <select id="filter-category"><option value="">All categories</option></select></label>
        <label>Level <select id="filter-level"><option value="">All levels</option><option value="BEGINNER">Beginner</option><option value="INTERMEDIATE">Intermediate</option><option value="ADVANCED">Advanced</option></select></label>
        <label>Sort by <select id="filter-sort"><option value="newest">Newest</option><option value="popular">Most Popular</option><option value="rating">Highest Rated</option><option value="alpha">Alphabetical</option></select></label>
        <a href="/create-skill.html" class="primary-cta" style="margin-left:auto">+ List a Skill</a>
      </div>
      <p id="results-count" class="results-count"></p>
      <div id="skills-grid" class="skills-grid"></div>
      <nav id="pagination" class="pagination" aria-label="Pagination"></nav>
    </main>
    <footer id="app-footer"></footer>
    <script type="module" src="/js/pages/marketplace.js"></script>
  </body>
</html>
