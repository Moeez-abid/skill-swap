<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Advanced Search — SkillSwap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fustat:wght@700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <script>(function(){var t=localStorage.getItem('skillswap-theme');if(!t)t=matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t);document.documentElement.style.colorScheme=t;})();</script>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <header id="app-header"></header>
    <main id="main-content" class="main-container" style="padding-top:100px;padding-bottom:64px">
      <div class="page-header">
        <h1 class="page-title">Advanced Search</h1>
        <p class="page-subtitle">Full-text search across titles, descriptions, and tags with multi-select filters.</p>
      </div>
      <form id="search-form" style="margin-bottom: 32px;">
        <!-- Prominent Search Bar -->
        <div class="glass-card" style="display: flex; padding: 6px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 20px var(--glass-shadow);">
          <input type="search" id="search-q" placeholder="What skill are you looking for?" style="flex: 1; border: none; background: transparent; font-size: 1rem; padding: 12px 16px; color: var(--text-primary); outline: none; box-shadow: none;" />
          <button type="submit" class="primary-cta" style="padding: 0 24px; font-size: 0.95rem; border-radius: 8px;">Search</button>
        </div>

        <!-- Organized, Small Filters -->
        <div class="filters-bar glass-card" style="padding: 16px; border-radius: 12px;">
          <label style="flex: 1; min-width: 140px;">Location
            <input type="text" id="filter-location" placeholder="City or region" style="padding: 8px 12px; font-size: 0.9rem;" />
          </label>
          <label style="flex: 1; min-width: 140px;">Min rating
            <input type="number" id="filter-rating" min="0" max="5" step="0.1" placeholder="0 - 5" style="padding: 8px 12px; font-size: 0.9rem;" />
          </label>
          <label style="flex: 1; min-width: 140px;">Sort by
            <select id="filter-sort" style="padding: 8px 12px; font-size: 0.9rem;">
              <option value="newest">Newest</option><option value="popular">Popular</option><option value="rating">Highest Rated</option>
            </select>
          </label>
        </div>

        <div class="filters-bar glass-card" style="margin-top: 16px; padding: 16px; border-radius: 12px; display: flex; align-items: flex-end; gap: 16px; flex-wrap: wrap;">
          <div style="flex: 1; min-width: 200px;">
            <label style="font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; display: block; font-weight: 500;">Categories</label>
            <div class="multi-select" id="ms-categories">
              <div class="multi-select-header" id="ms-categories-header" style="font-size: 0.9rem; padding: 8px 12px;">Any Category</div>
              <div class="multi-select-dropdown" id="filter-categories"></div>
            </div>
          </div>
          <div style="flex: 1; min-width: 200px;">
            <label style="font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; display: block; font-weight: 500;">Skill Level</label>
            <div class="multi-select" id="ms-levels">
              <div class="multi-select-header" id="ms-levels-header" style="font-size: 0.9rem; padding: 8px 12px;">Any Level</div>
              <div class="multi-select-dropdown" id="filter-levels">
                <label><input type="checkbox" name="level" value="BEGINNER" /> Beginner</label>
                <label><input type="checkbox" name="level" value="INTERMEDIATE" /> Intermediate</label>
                <label><input type="checkbox" name="level" value="ADVANCED" /> Advanced</label>
              </div>
            </div>
          </div>
          <div class="view-toggle" style="margin-left: auto;">
            <button type="button" id="view-grid" class="active">Grid</button>
            <button type="button" id="view-list">List</button>
          </div>
        </div>
      </form>
      <p id="results-count" class="results-count"></p>
      <div id="skills-grid" class="skills-grid"></div>
    </main>
    <footer id="app-footer"></footer>
    <script type="module" src="/js/pages/search.js"></script>
  </body>
</html>
