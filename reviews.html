<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reviews — SkillSwap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fustat:wght@700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <script>(function(){var t=localStorage.getItem('skillswap-theme');if(!t)t=matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t);document.documentElement.style.colorScheme=t;})();</script>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <header id="app-header"></header>
    <main class="main-container" style="padding-top:100px;padding-bottom:64px">
      <div class="page-header"><h1 class="page-title">Mutual Reviews</h1><p class="page-subtitle">Blind review system — feedback reveals only after both parties submit. Locked 48 hours after submission.</p></div>
      <form id="review-form" class="form-card glass-card">
        <div class="form-group"><label for="sessionId">Session ID</label><input id="sessionId" name="sessionId" required placeholder="From completed session" /></div>
        <div id="rating-fields"></div>
        <div class="form-group"><label for="feedback">Written feedback (50–1000 chars)</label><textarea id="feedback" name="feedback" required minlength="50" maxlength="1000"></textarea></div>
        <button type="submit" class="primary-cta">Submit Review</button>
        <p id="form-error" class="form-error" hidden></p>
      </form>
    </main>
    <footer id="app-footer"></footer>
    <script type="module" src="/js/pages/reviews.js"></script>
  </body>
</html>
